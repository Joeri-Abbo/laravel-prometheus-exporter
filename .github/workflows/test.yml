name: Test

on: ['push', 'pull_request']

jobs:
  test:
    name: php unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.2
          - 8.3
        composer:
          - ""
          - "--prefer-lowest"
          - "--prefer-stable"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - name: Install Dependencies
        run: composer update ${{ matrix.composer }} --no-interaction --no-progress
      - name: Run tests
        run: composer test
